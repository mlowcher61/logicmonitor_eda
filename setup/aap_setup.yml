---
# AAP Setup Playbook — LogicMonitor Auto-Remediation
#
# Run this playbook once to provision all required AAP objects:
#   - ServiceNow custom credential type
#   - ServiceNow credential (servicenow)
#   - Localhost inventory + host
#   - 4 job templates
#   - 3 workflow templates, each with approval nodes
#
# Prerequisites:
#   1. A Project named "LogicMonitor Automation" (see aap_project_name var)
#      must exist in AAP and be synced with the SCM repo containing the
#      playbooks in ../playbooks/
#   2. Inventories "Network Devices" and "Managed Servers" must exist
#      and contain the appropriate hosts.
#   3. A Machine credential named "net_cred" must exist for Cisco SSH access.
#   4. A Machine credential must exist for Linux/Windows server access.
#      Update the server_credential var below.
#
# AAP controller connection is read from environment variables:
#   CONTROLLER_HOST, CONTROLLER_USERNAME, CONTROLLER_PASSWORD
# or set them below in the vars section.
#
# Usage:
#   export CONTROLLER_HOST=https://your-aap-controller.example.com
#   export CONTROLLER_USERNAME=admin
#   export CONTROLLER_PASSWORD=yourpassword
#   ansible-playbook setup/aap_setup.yml

- name: Provision AAP objects for LogicMonitor Auto-Remediation
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    aap_organization: "Default"
    aap_project_name: "LogicMonitor Automation"

    # Inventory names — "Network Devices" and "Managed Servers" must pre-exist
    network_inventory: "Network Devices"
    server_inventory: "Managed Servers"
    localhost_inventory: "Localhost"

    # Credential names
    snow_credential_name: "servicenow"
    cisco_credential_name: "net_cred"
    server_credential_name: "linux_server_cred"   # Update to match your credential
    lm_credential_name: "logicmonitor"

    # ServiceNow connection details — stored in the custom credential
    # WARNING: Move sn_password out of plaintext before running in production.
    #          Use -e @vault_file.yml with ansible-vault instead.
    sn_host: "https://ven07621.service-now.com"
    sn_username: "mlowcher"
    sn_password: "R3dh@t123!"

    # LogicMonitor connection details — stored in the custom credential
    # Replace these placeholder values with your real LogicMonitor API credentials.
    # Access ID and Key are created under LM Settings → Users and Roles → API Tokens.
    lm_company:     "ACME"
    lm_access_id:   "84729301"
    lm_access_key:  "xK7mP2nQ9rT4vY8wZ1aB3cD5eF6gH0iJ"

    # Workflow approval timeout in seconds (3600 = 1 hour)
    approval_timeout: 3600

  # =========================================================================
  # BLOCK 1 — Custom Credential Types and Credentials
  # =========================================================================
  tasks:

    - name: Create ServiceNow custom credential type
      ansible.controller.credential_type:
        name: "ServiceNow"
        kind: cloud
        description: >-
          ServiceNow ITSM credential. Injects SN_HOST, SN_USERNAME,
          and SN_PASSWORD as environment variables.
        inputs:
          fields:
            - id: sn_host
              type: string
              label: "ServiceNow Instance URL"
              help_text: "e.g. https://yourinstance.service-now.com"
            - id: sn_username
              type: string
              label: "Username"
            - id: sn_password
              type: string
              label: "Password"
              secret: true
          required:
            - sn_host
            - sn_username
            - sn_password
        injectors:
          env:
            SN_HOST: !unsafe "{{ sn_host }}"
            SN_USERNAME: !unsafe "{{ sn_username }}"
            SN_PASSWORD: !unsafe "{{ sn_password }}"
        state: present

    - name: Create ServiceNow credential
      ansible.controller.credential:
        name: "{{ snow_credential_name }}"
        organization: "{{ aap_organization }}"
        credential_type: "ServiceNow"
        description: "ServiceNow instance credentials for auto-remediation workflows"
        inputs:
          sn_host: "{{ sn_host }}"
          sn_username: "{{ sn_username }}"
          sn_password: "{{ sn_password }}"
        state: present

    - name: Create LogicMonitor custom credential type
      ansible.controller.credential_type:
        name: "LogicMonitor"
        kind: cloud
        description: >-
          LogicMonitor API credential. Injects LM_COMPANY, LM_ACCESS_ID,
          and LM_ACCESS_KEY as environment variables.
        inputs:
          fields:
            - id: lm_company
              type: string
              label: "LogicMonitor Account Subdomain"
              help_text: "Your account subdomain (e.g. 'acme' for acme.logicmonitor.com)"
            - id: lm_access_id
              type: string
              label: "API Access ID"
              help_text: "Found under LM Settings → Users and Roles → API Tokens"
            - id: lm_access_key
              type: string
              label: "API Access Key"
              secret: true
              help_text: "Secret key paired with the Access ID"
          required:
            - lm_company
            - lm_access_id
            - lm_access_key
        injectors:
          env:
            LM_COMPANY:     !unsafe "{{ lm_company }}"
            LM_ACCESS_ID:   !unsafe "{{ lm_access_id }}"
            LM_ACCESS_KEY:  !unsafe "{{ lm_access_key }}"
        state: present

    - name: Create LogicMonitor credential
      ansible.controller.credential:
        name: "{{ lm_credential_name }}"
        organization: "{{ aap_organization }}"
        credential_type: "LogicMonitor"
        description: "LogicMonitor API credentials — update Access ID and Key before use"
        inputs:
          lm_company:    "{{ lm_company }}"
          lm_access_id:  "{{ lm_access_id }}"
          lm_access_key: "{{ lm_access_key }}"
        state: present

  # =========================================================================
  # BLOCK 2 — Localhost Inventory
  # =========================================================================

    - name: Create Localhost inventory
      ansible.controller.inventory:
        name: "{{ localhost_inventory }}"
        organization: "{{ aap_organization }}"
        description: "Localhost inventory for ServiceNow ITSM tasks"
        state: present

    - name: Add localhost host to Localhost inventory
      ansible.controller.host:
        name: localhost
        inventory: "{{ localhost_inventory }}"
        variables:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
        state: present

  # =========================================================================
  # BLOCK 3 — Job Templates
  # =========================================================================

    - name: Create job template — LM Create ServiceNow Incident
      ansible.controller.job_template:
        name: "LM - Create ServiceNow Incident"
        organization: "{{ aap_organization }}"
        project: "{{ aap_project_name }}"
        playbook: "playbooks/snow_create_incident.yml"
        inventory: "{{ localhost_inventory }}"
        credentials:
          - "{{ snow_credential_name }}"
        description: >-
          Opens a ServiceNow incident populated with LogicMonitor alert data.
          First node in every remediation workflow.
        ask_variables_on_launch: true
        state: present

    - name: Create job template — LM Cisco Interface No-Shut
      ansible.controller.job_template:
        name: "LM - Cisco Interface No-Shut"
        organization: "{{ aap_organization }}"
        project: "{{ aap_project_name }}"
        playbook: "playbooks/cisco_no_shut.yml"
        inventory: "{{ network_inventory }}"
        credentials:
          - "{{ cisco_credential_name }}"
          - "{{ snow_credential_name }}"
        description: >-
          Issues 'no shutdown' on a protected Cisco IOS interface (Tunnel0/Tunnel1),
          verifies the interface comes up, and resolves the ServiceNow incident.
        ask_variables_on_launch: true
        state: present

    - name: Create job template — LM CPU High HTTPD Restart
      ansible.controller.job_template:
        name: "LM - CPU High HTTPD Restart"
        organization: "{{ aap_organization }}"
        project: "{{ aap_project_name }}"
        playbook: "playbooks/cpu_httpd_restart.yml"
        inventory: "{{ server_inventory }}"
        credentials:
          - "{{ server_credential_name }}"
          - "{{ snow_credential_name }}"
        description: >-
          Restarts the web server (httpd/apache2 on Linux, W3SVC on Windows)
          in response to high CPU / web service down alert.
        ask_variables_on_launch: true
        become_enabled: true
        state: present

    - name: Create job template — LM Disk Space Cleanup
      ansible.controller.job_template:
        name: "LM - Disk Space Cleanup"
        organization: "{{ aap_organization }}"
        project: "{{ aap_project_name }}"
        playbook: "playbooks/disk_space_cleanup.yml"
        inventory: "{{ server_inventory }}"
        credentials:
          - "{{ server_credential_name }}"
          - "{{ snow_credential_name }}"
        description: >-
          Cleans /tmp, old log archives, and journals to recover disk space.
          Resolves the ServiceNow incident if disk drops below 80% after cleanup.
        ask_variables_on_launch: true
        become_enabled: true
        state: present

    - name: Create job template — LM Configure LogicMonitor
      ansible.controller.job_template:
        name: "LM - Configure LogicMonitor"
        organization: "{{ aap_organization }}"
        project: "{{ aap_project_name }}"
        playbook: "playbooks/logicmonitor_configure.yml"
        inventory: "{{ localhost_inventory }}"
        credentials:
          - "{{ lm_credential_name }}"
        description: >-
          Creates the EDA webhook HTTP integration, escalation chain, and three
          alert rules in LogicMonitor. Run once to wire LM → EDA alerting.
          Re-run safely — all tasks are idempotent.
          Launch with extra var lm_discover_only=true to list datasource names only.
        ask_variables_on_launch: true
        state: present

  # =========================================================================
  # BLOCK 4 — Workflow: Cisco Interface Remediation
  # =========================================================================

    - name: Create workflow template — LM Cisco Interface Remediation
      ansible.controller.workflow_job_template:
        name: "LM - Cisco Interface Remediation"
        organization: "{{ aap_organization }}"
        description: >-
          End-to-end remediation for a downed Cisco protected interface.
          Opens SNOW incident → waits for approval → no-shuts the interface → resolves SNOW.
        ask_variables_on_launch: true
        state: present

    # --- Cisco workflow nodes ---

    - name: Cisco WF — Create SNOW incident node
      ansible.controller.workflow_job_template_node:
        identifier: "cisco_node_snow"
        workflow_job_template: "LM - Cisco Interface Remediation"
        unified_job_template: "LM - Create ServiceNow Incident"
        organization: "{{ aap_organization }}"
        state: present

    - name: Cisco WF — Create approval node
      ansible.controller.workflow_job_template_node:
        identifier: "cisco_node_approval"
        workflow_job_template: "LM - Cisco Interface Remediation"
        approval_node:
          name: "Approve Cisco Interface Remediation"
          description: >-
            LogicMonitor detected a downed protected interface.
            Review the ServiceNow incident and approve to execute
            'no shutdown' on the identified Cisco IOS interface.
          timeout: "{{ approval_timeout }}"
        organization: "{{ aap_organization }}"
        state: present

    - name: Cisco WF — Create remediation node
      ansible.controller.workflow_job_template_node:
        identifier: "cisco_node_remediation"
        workflow_job_template: "LM - Cisco Interface Remediation"
        unified_job_template: "LM - Cisco Interface No-Shut"
        organization: "{{ aap_organization }}"
        state: present

    # --- Cisco workflow node links ---

    - name: Cisco WF — Link SNOW incident → approval (on success)
      ansible.controller.workflow_job_template_node:
        identifier: "cisco_node_snow"
        workflow_job_template: "LM - Cisco Interface Remediation"
        success_nodes:
          - "cisco_node_approval"
        organization: "{{ aap_organization }}"
        state: present

    - name: Cisco WF — Link approval → remediation (on approve)
      ansible.controller.workflow_job_template_node:
        identifier: "cisco_node_approval"
        workflow_job_template: "LM - Cisco Interface Remediation"
        success_nodes:
          - "cisco_node_remediation"
        organization: "{{ aap_organization }}"
        state: present

  # =========================================================================
  # BLOCK 5 — Workflow: CPU High Utilization Remediation
  # =========================================================================

    - name: Create workflow template — LM CPU High Utilization Remediation
      ansible.controller.workflow_job_template:
        name: "LM - CPU High Utilization Remediation"
        organization: "{{ aap_organization }}"
        description: >-
          End-to-end remediation for high CPU / web server down.
          Opens SNOW incident → waits for approval → restarts httpd/IIS → resolves SNOW.
        ask_variables_on_launch: true
        state: present

    # --- CPU workflow nodes ---

    - name: CPU WF — Create SNOW incident node
      ansible.controller.workflow_job_template_node:
        identifier: "cpu_node_snow"
        workflow_job_template: "LM - CPU High Utilization Remediation"
        unified_job_template: "LM - Create ServiceNow Incident"
        organization: "{{ aap_organization }}"
        state: present

    - name: CPU WF — Create approval node
      ansible.controller.workflow_job_template_node:
        identifier: "cpu_node_approval"
        workflow_job_template: "LM - CPU High Utilization Remediation"
        approval_node:
          name: "Approve Web Server Restart"
          description: >-
            LogicMonitor detected critical CPU utilization — the web server
            appears unresponsive. Review the ServiceNow incident and approve
            to restart the httpd/apache2/IIS service on the affected host.
          timeout: "{{ approval_timeout }}"
        organization: "{{ aap_organization }}"
        state: present

    - name: CPU WF — Create remediation node
      ansible.controller.workflow_job_template_node:
        identifier: "cpu_node_remediation"
        workflow_job_template: "LM - CPU High Utilization Remediation"
        unified_job_template: "LM - CPU High HTTPD Restart"
        organization: "{{ aap_organization }}"
        state: present

    # --- CPU workflow node links ---

    - name: CPU WF — Link SNOW incident → approval (on success)
      ansible.controller.workflow_job_template_node:
        identifier: "cpu_node_snow"
        workflow_job_template: "LM - CPU High Utilization Remediation"
        success_nodes:
          - "cpu_node_approval"
        organization: "{{ aap_organization }}"
        state: present

    - name: CPU WF — Link approval → remediation (on approve)
      ansible.controller.workflow_job_template_node:
        identifier: "cpu_node_approval"
        workflow_job_template: "LM - CPU High Utilization Remediation"
        success_nodes:
          - "cpu_node_remediation"
        organization: "{{ aap_organization }}"
        state: present

  # =========================================================================
  # BLOCK 6 — Workflow: Disk Space Remediation
  # =========================================================================

    - name: Create workflow template — LM Disk Space Remediation
      ansible.controller.workflow_job_template:
        name: "LM - Disk Space Remediation"
        organization: "{{ aap_organization }}"
        description: >-
          End-to-end remediation for critical disk space utilization.
          Opens SNOW incident → waits for approval → cleans disk → resolves SNOW.
        ask_variables_on_launch: true
        state: present

    # --- Disk workflow nodes ---

    - name: Disk WF — Create SNOW incident node
      ansible.controller.workflow_job_template_node:
        identifier: "disk_node_snow"
        workflow_job_template: "LM - Disk Space Remediation"
        unified_job_template: "LM - Create ServiceNow Incident"
        organization: "{{ aap_organization }}"
        state: present

    - name: Disk WF — Create approval node
      ansible.controller.workflow_job_template_node:
        identifier: "disk_node_approval"
        workflow_job_template: "LM - Disk Space Remediation"
        approval_node:
          name: "Approve Disk Space Cleanup"
          description: >-
            LogicMonitor detected critical disk utilization.
            Review the ServiceNow incident and approve to remove stale /tmp files,
            old compressed log archives, and vacuum the systemd journal.
            No application data or active logs will be deleted.
          timeout: "{{ approval_timeout }}"
        organization: "{{ aap_organization }}"
        state: present

    - name: Disk WF — Create remediation node
      ansible.controller.workflow_job_template_node:
        identifier: "disk_node_remediation"
        workflow_job_template: "LM - Disk Space Remediation"
        unified_job_template: "LM - Disk Space Cleanup"
        organization: "{{ aap_organization }}"
        state: present

    # --- Disk workflow node links ---

    - name: Disk WF — Link SNOW incident → approval (on success)
      ansible.controller.workflow_job_template_node:
        identifier: "disk_node_snow"
        workflow_job_template: "LM - Disk Space Remediation"
        success_nodes:
          - "disk_node_approval"
        organization: "{{ aap_organization }}"
        state: present

    - name: Disk WF — Link approval → remediation (on approve)
      ansible.controller.workflow_job_template_node:
        identifier: "disk_node_approval"
        workflow_job_template: "LM - Disk Space Remediation"
        success_nodes:
          - "disk_node_remediation"
        organization: "{{ aap_organization }}"
        state: present

  # =========================================================================
  # BLOCK 7 — Job Template: Cisco SNMP Trap Configuration
  # =========================================================================

    - name: Create job template — LM Cisco SNMP Trap Configuration
      ansible.controller.job_template:
        name: "LM - Cisco SNMP Trap Configuration"
        organization: "{{ aap_organization }}"
        project: "{{ aap_project_name }}"
        playbook: "playbooks/cisco_snmp_trap.yml"
        inventory: "{{ network_inventory }}"
        credentials:
          - "{{ cisco_credential_name }}"
        description: >-
          Configures SNMPv2c community string, trap destination (LogicMonitor collector),
          trap source interface (Tunnel1), and enables linkup/linkdown, BGP, and config traps
          on all hosts in the 'cisco' inventory group.
          Requires logicmonitor_ip to be passed as an extra variable or via survey.
        ask_variables_on_launch: true
        survey_enabled: true
        survey_spec:
          name: "SNMP Trap Configuration Survey"
          description: "Provide the LogicMonitor collector IP for SNMP trap delivery"
          spec:
            - question_name: "LogicMonitor Collector IP"
              question_description: "IP address of the LogicMonitor collector that will receive SNMP traps"
              variable: logicmonitor_ip
              type: text
              required: true
              min: 7
              max: 15
        state: present

  # =========================================================================
  # BLOCK 8 — Summary
  # =========================================================================

    - name: Setup complete — print object summary
      ansible.builtin.debug:
        msg:
          - "===== AAP Setup Complete ====="
          - ""
          - "Credential Types : ServiceNow, LogicMonitor"
          - "Credentials      : {{ snow_credential_name }}, {{ lm_credential_name }}"
          - "Inventory        : {{ localhost_inventory }}"
          - ""
          - "Job Templates:"
          - "  - LM - Create ServiceNow Incident"
          - "  - LM - Cisco Interface No-Shut"
          - "  - LM - CPU High HTTPD Restart"
          - "  - LM - Disk Space Cleanup"
          - "  - LM - Cisco SNMP Trap Configuration"
          - "  - LM - Configure LogicMonitor"
          - ""
          - "Workflow Templates:"
          - "  - LM - Cisco Interface Remediation"
          - "  - LM - CPU High Utilization Remediation"
          - "  - LM - Disk Space Remediation"
          - ""
          - "Next steps:"
          - "  1. Update 'logicmonitor' credential with real LM Access ID and Key"
          - "  2. Run 'LM - Configure LogicMonitor' to wire LM → EDA alerting"
          - "  3. Run 'LM - Cisco SNMP Trap Configuration' with logicmonitor_ip survey answer"
          - "  4. Create an EDA Rulebook Activation using rulebooks/lm_remediation.yml"
          - "  5. Configure the EDA activation with your AAP Controller token credential"
          - "  6. Verify 'Network Devices' and 'Managed Servers' inventories contain hosts"
          - "  7. Verify '{{ server_credential_name }}' credential exists for server access"
